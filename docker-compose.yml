services:

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - datos_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    volumes:
      - .:/app
      - archivos_estaticos:/app/staticfiles
      - archivos_media:/app/media
    expose:
      - 8000
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - archivos_estaticos:/app/staticfiles:ro
      - archivos_media:/app/media:ro
    depends_on:
      - web

volumes:
  datos_postgres:
  archivos_estaticos:
  archivos_media:
