{% extends "base.html" %}
{% load quejas_extras %}

{% block titulo %}Cambiar estado — {{ queja.titulo }}{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title mb-1">
          <i class="bi bi-arrow-repeat text-warning me-2"></i>Cambiar estado
        </h2>
        <p class="text-muted mb-4">{{ queja.titulo }}</p>

        <div class="mb-3">
          <span class="me-2">Estado actual:</span>
          <span class="badge bg-{{ queja.estado|color_estado }} fs-6">
            {{ queja.get_estado_display }}
          </span>
        </div>

        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label for="id_estado" class="form-label fw-semibold">Nuevo estado</label>
            <select name="estado" id="id_estado" class="form-select form-select-lg">
              {% for valor, etiqueta in opciones_estado %}
                <option value="{{ valor }}" {% if queja.estado == valor %}selected{% endif %}>
                  {{ etiqueta }}
                </option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">
              <i class="bi bi-check-lg me-1"></i>Guardar
            </button>
            <a href="{{ queja.get_absolute_url }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
