{% extends "base.html" %}

{% block titulo %}Correo enviado{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <i class="bi bi-envelope-check display-3 text-primary"></i>
        <h3 class="mt-3">Revisa tu correo</h3>
        <p class="text-muted">Si existe una cuenta con ese correo, recibirás las instrucciones para restablecer tu contraseña en breve.</p>
        <a href="{% url 'iniciar-sesion' %}" class="btn btn-outline-primary mt-2">Volver al inicio de sesión</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
