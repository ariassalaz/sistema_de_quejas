{% extends "base.html" %}

{% block titulo %}Cambiar contraseña{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">
          <i class="bi bi-key text-primary me-2"></i>Cambiar contraseña
        </h2>
        <form method="post">
          {% csrf_token %}
          {% for campo in form %}
            <div class="mb-3">
              <label for="{{ campo.id_for_label }}" class="form-label fw-semibold">{{ campo.label }}</label>
              <input type="{{ campo.field.widget.input_type }}"
                     name="{{ campo.html_name }}"
                     id="{{ campo.id_for_label }}"
                     class="form-control {% if campo.errors %}is-invalid{% endif %}">
              {% for error in campo.errors %}
                <div class="invalid-feedback">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Guardar cambios</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
