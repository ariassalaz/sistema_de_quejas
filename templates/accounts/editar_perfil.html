{% extends "base.html" %}

{% block titulo %}Editar perfil{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="card-title mb-4">
          <i class="bi bi-pencil text-primary me-2"></i>Editar perfil
        </h2>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {% for campo in form %}
            <div class="mb-3">
              <label for="{{ campo.id_for_label }}" class="form-label fw-semibold">{{ campo.label }}</label>
              {{ campo }}
              {% for error in campo.errors %}
                <div class="text-danger small">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="{% url 'perfil' %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
